<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Manutenção de Usuários</title>
</head>
<body>
<table cellpadding="5">
  <tr>
    <td colspan="2">
      <b>MANUTENÇÃO DE USUÁRIOS DO SISTEMA INTERNO</b>
    </td>
  </tr>

  <tr>
    <td><b>Login</b></td>
    <td><input type="text" name="login"></td>
  </tr>

  <tr>
    <td><b>Senha</b></td>
    <td><input type="password" name="senha"></td>
  </tr>

  <tr>
    <td><b>Status</b></td>
    <td>
      <select name="status">
        <option>Inativo</option>
        <option>Ativo</option>
      </select>
    </td>
  </tr>

  <tr>
    <td><b>Tipo</b></td>
    <td>
      <input type="radio" name="tipo"> Técnico
      <input type="radio" name="tipo"> Professor
      <input type="radio" name="tipo"> Aluno
    </td>
  </tr>

  <tr>
    <td><b>Data Criação</b></td>
    <td><input type="text" name="data"></td>
  </tr>

  <tr>
    <td><b>Perfil</b></td>
    <td>
      <input type="radio" name="perfil"> Convidado
      <input type="radio" name="perfil"> Administrador
    </td>
  </tr>

  <tr>
    <td valign="top"><b>Observações</b></td>
    <td><textarea rows="5" cols="40"></textarea></td>
  </tr>

  <tr>
    <td valign="top"><b>Módulos</b></td>
    <td>
      <input type="checkbox"> Compras
      <input type="checkbox"> Biblioteca
      <input type="checkbox"> Acadêmico <br>
      <input type="checkbox"> Documentação
      <input type="checkbox"> Recursos Humanos
    </td>
  </tr>

  <tr>
    <td></td>
    <td>
      <input type="submit" value="Cadastrar">
      <input type="reset" value="Excluir">
    </td>
  </tr>
</table>
</body>
</html>
